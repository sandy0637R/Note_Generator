<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <div class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card note-card">
          <div class="card-header note-header text-center">
            <h2>
              <i class="bi bi-journal-richtext me-2"></i>
              Note Generator
            </h2>
          </div>

          <div class="card-body">
            <div class="text-center mb-4">
              <button id="themeToggle" class="btn btn-dark custom-btn">
                <i class="bi bi-circle-half me-2"></i>
                Theme
              </button>
            </div>

            <label class="form-label">
              <i class="bi bi-pencil-square me-2"></i>
              Write Notes
            </label>

            <textarea
              id="type"
              class="form-control mb-4"
              rows="8"
              placeholder="Start typing your notes..."
            ></textarea>

            <label class="form-label">
              <i class="bi bi-eye me-2"></i>
              Preview
            </label>

            <div id="display">Start typing...</div>

            <div
              class="d-flex flex-column flex-md-row gap-3 justify-content-center mt-4"
            >
              <button id="pngBtn" class="btn btn-success custom-btn">
                <i class="bi bi-image me-2"></i>
                Download PNG
              </button>

              <button id="pdfBtn" class="btn btn-danger custom-btn">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>
                Download PDF
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</html>
